<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таск Менеджер</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #f5f6fa; font-family: Arial, sans-serif;
        }
        #app-container { position: relative; }
        canvas { border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        #overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9998;
        }
        #overlay.visible { display: block; }
        #add-form {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff; border: 2px solid #636e72; border-radius: 12px;
            padding: 20px; width: 740px; z-index: 9999; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #add-form.visible { display: block; }
        #add-form h3 { margin: 0 0 12px 0; color: #2d3436; }
        #add-form input, #add-form textarea {
            padding: 8px 10px; border: 1px solid #b2bec3; border-radius: 4px;
            font-size: 13px; font-family: Arial, sans-serif; margin-right: 8px; margin-bottom: 8px;
        }
        #add-form input[type="text"] { width: 220px; }
        #add-form input[type="number"] { width: 60px; }
        #add-form textarea { width: 350px; height: 45px; resize: vertical; vertical-align: top; }
        #add-form .type-btn {
            padding: 7px 14px; border: none; border-radius: 4px; cursor: pointer;
            font-size: 12px; margin-right: 4px; background: #dfe6e9; color: #2d3436; font-family: Arial, sans-serif;
        }
        #add-form .type-btn.active { color: #fff; }
        #add-form .type-btn.weekly.active { background: #6c5ce7; }
        #add-form .type-btn.monthly.active { background: #e17055; }
        #add-form .type-btn.onetime.active { background: #00b894; }
        #add-form .assignee-btn {
            padding: 7px 12px; border: none; border-radius: 4px; cursor: pointer;
            font-size: 12px; margin-right: 4px; background: #dfe6e9; color: #2d3436; font-family: Arial, sans-serif;
        }
        #add-form .assignee-btn.active { background: #0984e3; color: #fff; }
        #add-form .save-btn {
            padding: 10px 28px; background: #00b894; color: #fff; border: none;
            border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; font-family: Arial, sans-serif;
        }
        #add-form .cancel-btn {
            padding: 10px 20px; background: #d63031; color: #fff; border: none;
            border-radius: 6px; cursor: pointer; font-size: 14px; margin-left: 8px; font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="overlay" onclick="hideForm()"></div>
        <div id="add-form">
            <h3>Новая задача</h3>
            <input type="text" id="task-title" placeholder="Название задачи...">
            <div style="display:inline-block;">
                <button class="type-btn weekly active" onclick="setType('weekly')">Еженед.</button>
                <button class="type-btn monthly" onclick="setType('monthly')">Ежемес.</button>
                <button class="type-btn onetime" onclick="setType('onetime')">Разов.</button>
            </div>
            <input type="text" id="task-hours" placeholder="Часы" style="width:60px;">
            <span style="color:#636e72; margin-right:8px;">ч</span>
            <input type="text" id="task-minutes" placeholder="Мин" style="width:60px;">
            <span style="color:#636e72;">мин</span>
            <input type="date" id="task-deadline" style="width:160px;">
            <br>
            <textarea id="task-description" placeholder="Описание задачи и вводные..."></textarea>
            <br><br>
            <span style="color:#636e72; font-size:12px;">Ответственный:</span>
            <div id="assignee-btns" style="display:inline-block;"></div>
            <br><br>
